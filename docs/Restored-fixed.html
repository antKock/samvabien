<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>samvabien — Olive & Terre · Hero variations</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', system-ui, -apple-system, sans-serif; transition: background 0.3s, color 0.3s; }

  .top-bar {
    position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    transition: background 0.3s;
  }
  .top-bar h1 { font-size: 13px; font-weight: 800; white-space: nowrap; }
  .ctrl-group { display: flex; gap: 3px; flex-wrap: wrap; }
  .ctrl-btn {
    padding: 5px 10px; border-radius: 7px; border: 1.5px solid transparent;
    font-family: inherit; font-size: 10px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
  }
  .ctrl-sep { width: 1px; height: 20px; flex-shrink: 0; }

  .phones-row {
    display: flex; justify-content: center; gap: 24px; padding: 28px 16px 40px;
    flex-wrap: wrap; align-items: flex-start;
  }
  .phone-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .phone-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
  .phone-sub { font-size: 9px; font-weight: 600; text-align: center; max-width: 280px; margin-bottom: 4px; line-height: 1.4; }

  .phone-frame {
    border-radius: 36px; padding: 44px 0 20px; width: 300px;
    overflow: hidden; position: relative;
    aspect-ratio: 9 / 19.5;
  }
  .phone-inner { padding: 0 13px; }
  .status-bar { display: flex; justify-content: space-between; padding: 3px 13px 5px; font-size: 9px; font-weight: 700; opacity: 0.4; }

  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.7); } }

  .progress-track { width: 100%; height: 6px; border-radius: 3px; position: relative; margin-top: 6px; }
  .progress-fill { height: 100%; border-radius: 3px; position: absolute; left: 0; top: 0; }
  .progress-marker {
    position: absolute; top: -3px; width: 12px; height: 12px; border-radius: 50%;
    transform: translateX(-50%); border: 2px solid; box-sizing: border-box;
  }
</style>
</head>
<body>

<div class="top-bar" id="topbar"></div>
<div class="phones-row" id="phones"></div>

<script>
let cfg = { theme: 'light', moment: 'afternoon', milkStatus: 'in', sleepStatus: 'in' };

const COLORS = {
  day: {
    bg:'#f6f5ee', surface:'#ffffff', text:'#32321e', textSec:'#8a8870',
    sleep:   { bg:'#eaecda', accent:'#8a9a6a', icon:'#6a7a4a' },
    milk:    { bg:'#f5e6d6', accent:'#c08a60', icon:'#a06840' },
    primary: { bg:'#6a7a4a', text:'#fff' },
    secondary: { bg:'#eaecda', text:'#6a7a4a' },
    avatar:  { bg:'#dde2c8', dot:'#8a9a6a', text:'#4a5a32' },
    inRange: { accent:'#8a9a5a' },
    rangeBg:'rgba(120,130,80,0.15)', rangeBorder:'rgba(120,130,80,0.28)',
    border:'rgba(0,0,0,0.06)', headerBorder:'rgba(0,0,0,0.12)',
    track:'#dce0cc', average:'#a0a486',
    cta:'rgba(138,154,106,0.2)',
    heroG1:'#a8b490', heroG2:'#8a9c72', heroG3:'#6a8054',
  },
  night: {
    bg:'#181810', surface:'#22221a', text:'#c8c8b0', textSec:'#7a7a60',
    sleep:   { bg:'#222818', accent:'#7a8a5a', icon:'#98a878' },
    milk:    { bg:'#261e14', accent:'#b08050', icon:'#cca070' },
    primary: { bg:'#4a5a32', text:'#fff' },
    secondary: { bg:'#222818', text:'#7a8a5a' },
    avatar:  { bg:'#282e1c', dot:'#7a8a5a', text:'#98a878' },
    inRange: { accent:'#7a8a4a' },
    rangeBg:'rgba(100,110,60,0.2)', rangeBorder:'rgba(100,110,60,0.3)',
    border:'rgba(255,255,255,0.06)', headerBorder:'rgba(255,255,255,0.12)',
    track:'#222618', average:'#5a6a48',
    cta:'rgba(122,138,90,0.2)',
    heroG1:'#3a4228', heroG2:'#2e381e', heroG3:'#222c16',
  }
};

const moments = {
  afternoon: { label:'Après-midi', time:'15:53', heroState:'sleep', emoji:'😴', text:'Sam dort',          duration:'1h23', subtitle:'Endormi à 14h30' },
  evening:   { label:'Soir',       time:'18:45', heroState:'awake', emoji:'🌤️', text:'Sam est réveillé', duration:'2h15', subtitle:'Éveillé depuis 16h30' },
  night:     { label:'Nuit',       time:'3:12',  heroState:'sleep', emoji:'💤', text:'Sam dort',          duration:'7h42', subtitle:'Couché à 19h30 · 0 réveil' },
};

// Helper: safe alpha from any hex color — no more fragile "#rrggbb" + "XX" concatenation
const alpha = (hex, a) => {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
};

const isNight = () => cfg.theme === 'dark';
const getColors = () => COLORS[isNight()?'night':'day'];
const getMoment = () => moments[cfg.moment];

function momentProgress() {
  const m = cfg.moment;
  if (m==='afternoon') return { milkFill:55, sleepFill:68, milkAvg:60, sleepAvg:62 };
  if (m==='evening')   return { milkFill:72, sleepFill:85, milkAvg:78, sleepAvg:80 };
  return { milkFill:82, sleepFill:95, milkAvg:88, sleepAvg:90 };
}
function milkData() {
  const status = cfg.milkStatus, p = momentProgress();
  if (status==='below') return { value:'280 mL', fill:Math.max(p.milkFill-15,5), avg:p.milkAvg, inRange:false };
  if (status==='in')    return { value:'480 mL', fill:p.milkFill,                 avg:p.milkAvg, inRange:true };
  return { value:'720 mL', fill:Math.min(p.milkFill+25,98), avg:p.milkAvg, inRange:false };
}
function sleepData() {
  const status = cfg.sleepStatus, p = momentProgress();
  if (status==='below') return { value:'8h20',  fill:Math.max(p.sleepFill-20,5), avg:p.sleepAvg, inRange:false };
  if (status==='in')    return { value:'12h40', fill:p.sleepFill,                  avg:p.sleepAvg, inRange:true };
  return { value:'16h10', fill:Math.min(p.sleepFill+15,98), avg:p.sleepAvg, inRange:false };
}

function checkmark(colors, inRange) {
  if (!inRange) return '';
  return `<span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:${colors.inRange.accent};color:#fff;font-size:9px;font-weight:800">✓</span>`;
}

function progressBar(colors, catColor, fillPct, avgPct, inRange) {
  const fillColor = inRange ? colors.inRange.accent : catColor;
  return `<div class="progress-track" style="background:${colors.track}">
    <div style="position:absolute;left:52%;width:36%;height:100%;background:${colors.rangeBg};border-radius:3px;border:1px solid ${colors.rangeBorder}"></div>
    <div class="progress-fill" style="width:${fillPct}%;background:${fillColor};opacity:${inRange?0.8:0.5}"></div>
    <div class="progress-marker" style="left:${avgPct}%;background:${colors.rangeBorder};border-color:${colors.rangeBorder}"></div>
    <div style="position:absolute;top:-2px;left:${fillPct}%;width:10px;height:10px;border-radius:50%;transform:translateX(-50%);background:${colors.surface};box-shadow:0 0 0 1.5px ${fillColor}"></div>
  </div>`;
}

function detailRows(colors) {
  const items = [
    { dot:colors.sleep.accent, label:'Sieste',  time:'14h30',       value:'1h23',   color:colors.sleep.icon },
    { dot:colors.milk.accent,  label:'Biberon', time:'12h15',       value:'150 mL', color:colors.milk.icon },
    { dot:colors.sleep.accent, label:'Sieste',  time:'matin',       value:'1h00',   color:colors.sleep.icon },
    { dot:colors.milk.accent,  label:'Biberon', time:'matin',       value:'180 mL', color:colors.milk.icon },
    { dot:colors.sleep.accent, label:'Nuit',    time:'19h30→5h50',  value:'10h20',  color:colors.sleep.icon },
  ];
  return items.map(i=>`<div style="border-bottom:1px solid ${colors.border}"><div style="display:flex;align-items:center;gap:7px;padding:6px 0">
    <div style="width:5px;height:5px;border-radius:50%;background:${i.dot}"></div>
    <div style="font-size:10px;font-weight:600;color:${colors.text};flex:1">${i.label}</div>
    <div style="font-size:9px;font-weight:600;color:${colors.textSec};width:60px;text-align:right">${i.time}</div>
    <div style="font-size:10px;font-weight:700;color:${i.color};width:46px">${i.value}</div>
  </div></div>`).join('');
}

// ====== SHARED PARTS ======
function header(colors, moment) {
  return `<div class="status-bar" style="color:${colors.textSec}"><span>${moment.time}</span><span>📶 🔋</span></div>
  <div class="phone-inner">
    <div style="padding:2px 0 6px">
      <div style="font-size:9px;font-weight:600;color:${colors.textSec}">Vendredi 7 mars</div>
    </div>`;
}

function detailSection(colors) {
  return `<div style="border-top:1px solid ${colors.border};padding-top:8px">
    <div style="font-size:8px;font-weight:700;color:${colors.textSec};text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px">Aujourd'hui</div>
    ${detailRows(colors)}
  </div></div>`;
}

// Shared: KPI cards (bottom accent, tinted terre gradient, CTA "+")
function kpiCards(colors, milk, sleep, night) {
  const milkStyle = night
    ? `background:linear-gradient(165deg, ${colors.milk.bg}, ${alpha(colors.milk.accent,0.06)});border:1px solid ${alpha(colors.milk.accent,0.08)};border-bottom:2.5px solid ${alpha(colors.milk.accent,0.38)};box-shadow:inset 0 1px 0 rgba(255,255,255,0.04), 0 3px 12px ${alpha(colors.milk.accent,0.06)}`
    : `background:linear-gradient(165deg, ${colors.milk.bg}, ${alpha(colors.milk.accent,0.03)});border:1px solid ${alpha(colors.milk.accent,0.06)};border-bottom:2.5px solid ${alpha(colors.milk.accent,0.25)};box-shadow:inset 0 1px 0 rgba(255,255,255,0.35), 0 3px 12px ${alpha(colors.milk.accent,0.02)}`;
  const sleepStyle = night
    ? `background:linear-gradient(165deg, ${colors.sleep.bg}, ${alpha(colors.sleep.accent,0.06)});border:1px solid ${alpha(colors.sleep.accent,0.08)};border-bottom:2.5px solid ${alpha(colors.sleep.accent,0.38)};box-shadow:inset 0 1px 0 rgba(255,255,255,0.04), 0 3px 12px ${alpha(colors.sleep.accent,0.06)}`
    : `background:linear-gradient(165deg, ${colors.sleep.bg}, ${alpha(colors.sleep.accent,0.03)});border:1px solid ${alpha(colors.sleep.accent,0.06)};border-bottom:2.5px solid ${alpha(colors.sleep.accent,0.25)};box-shadow:inset 0 1px 0 rgba(255,255,255,0.35), 0 3px 12px ${alpha(colors.sleep.accent,0.02)}`;
  const ctaStyle = (iconColor) => `width:30px;height:30px;border-radius:10px;border:none;font-size:14px;font-weight:800;cursor:pointer;background:${alpha(iconColor,0.08)};color:${iconColor};box-shadow:inset 0 1px 0 rgba(255,255,255,${night?'0.05':'0.2'}), 0 2px 4px ${alpha(iconColor,0.06)}`;

  return `
    <div style="border-radius:18px;padding:11px 11px 11px 14px;margin-bottom:8px;${milkStyle}">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="font-size:16px">🍼</div>
        <div style="flex:1">
          <div style="font-size:8px;font-weight:600;color:${colors.milk.icon}">Lait aujourd'hui</div>
          <div style="display:flex;align-items:center;gap:4px">
            <div style="font-size:22px;font-weight:800;color:${colors.text};line-height:1.1">${milk.value}</div>
            ${checkmark(colors,milk.inRange)}
          </div>
        </div>
        <button style="${ctaStyle(colors.milk.icon)}">+</button>
      </div>
      ${progressBar(colors,colors.milk.accent,milk.fill,milk.avg,milk.inRange)}
    </div>
    <div style="border-radius:18px;padding:11px 11px 11px 14px;margin-bottom:10px;${sleepStyle}">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="font-size:16px">😴</div>
        <div style="flex:1">
          <div style="font-size:8px;font-weight:600;color:${colors.sleep.icon}">Sommeil total</div>
          <div style="display:flex;align-items:center;gap:4px">
            <div style="font-size:22px;font-weight:800;color:${colors.text};line-height:1.1">${sleep.value}</div>
            ${checkmark(colors,sleep.inRange)}
          </div>
        </div>
        <button style="${ctaStyle(colors.sleep.icon)}">+</button>
      </div>
      ${progressBar(colors,colors.sleep.accent,sleep.fill,sleep.avg,sleep.inRange)}
    </div>`;
}

// ===================== V0 — VANILLA =====================
function heroFlat(colors, moment, isSleeping) {
  return `<button style="width:100%;text-align:center;cursor:pointer;font-family:inherit;position:relative;border-radius:20px;padding:20px 18px 16px;margin-bottom:10px;border:none;background:${isSleeping?colors.avatar.bg:colors.secondary.bg}">
    <div style="font-size:28px;margin-bottom:3px">${moment.emoji}</div>
    <div style="font-size:13px;font-weight:700;color:${isSleeping?colors.avatar.text:colors.text}">${moment.text}</div>
    <div style="font-size:36px;font-weight:800;color:${isSleeping?colors.avatar.text:colors.text};line-height:1;letter-spacing:-1px">${moment.duration}</div>
    <div style="font-size:9px;font-weight:600;color:${isSleeping?colors.avatar.text:colors.textSec};opacity:0.5;margin-top:2px">${moment.subtitle}</div>
    ${isSleeping?`<div class="pulse-dot" style="background:${colors.avatar.dot};position:absolute;top:13px;right:13px"></div>`:''}
  </button>`;
}

function renderV0(colors, moment, milk, sleep, isSleeping) {
  const night = isNight();
  const milkStyle = `background:${colors.milk.bg};border-radius:16px;padding:11px 11px 11px 14px;margin-bottom:8px`;
  const sleepStyle = `background:${colors.sleep.bg};border-radius:16px;padding:11px 11px 11px 14px;margin-bottom:10px`;

  return `${header(colors,moment)}
    ${heroFlat(colors,moment,isSleeping)}
    <div style="${milkStyle}">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="font-size:16px">🍼</div>
        <div style="flex:1">
          <div style="font-size:8px;font-weight:600;color:${colors.milk.icon}">Lait aujourd'hui</div>
          <div style="display:flex;align-items:center;gap:4px">
            <div style="font-size:22px;font-weight:800;color:${colors.text};line-height:1.1">${milk.value}</div>
            ${checkmark(colors,milk.inRange)}
          </div>
        </div>
        <button style="width:30px;height:30px;border-radius:10px;border:none;font-size:14px;font-weight:800;cursor:pointer;background:${colors.cta};color:${colors.milk.icon}">+</button>
      </div>
      ${progressBar(colors,colors.milk.accent,milk.fill,milk.avg,milk.inRange)}
    </div>
    <div style="${sleepStyle}">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="font-size:16px">😴</div>
        <div style="flex:1">
          <div style="font-size:8px;font-weight:600;color:${colors.sleep.icon}">Sommeil total</div>
          <div style="display:flex;align-items:center;gap:4px">
            <div style="font-size:22px;font-weight:800;color:${colors.text};line-height:1.1">${sleep.value}</div>
            ${checkmark(colors,sleep.inRange)}
          </div>
        </div>
        <button style="width:30px;height:30px;border-radius:10px;border:none;font-size:14px;font-weight:800;cursor:pointer;background:${colors.cta};color:${colors.sleep.icon}">+</button>
      </div>
      ${progressBar(colors,colors.sleep.accent,sleep.fill,sleep.avg,sleep.inRange)}
    </div>
    ${detailSection(colors)}`;
}

// ===================== VC — SOUS-BOIS + HERO ÉLEVÉ =====================
// Même cards. Hero: gradient olive + forte élévation (ombres multi-couches), pas de border.
function renderVC(colors, moment, milk, sleep, isSleeping) {
  const night = isNight();
  // In dark mode: always use deep gradient (heroG1→heroG3) with strong elevation
  // In light mode: sleeping gets deeper gradient, awake gets lighter one
  const heroStyle = night
    ? `background:linear-gradient(155deg, ${colors.heroG1}, ${colors.heroG3});box-shadow:0 2px 6px ${alpha(colors.heroG3,0.21)}, 0 8px 22px ${alpha(colors.heroG3,0.15)}, 0 18px 44px ${alpha(colors.heroG3,0.09)};transform:translateY(-1px)`
    : isSleeping
      ? `background:linear-gradient(160deg, ${alpha(colors.heroG1,0.93)}, ${colors.heroG3});box-shadow:0 2px 6px ${alpha(colors.heroG3,0.19)}, 0 8px 20px ${alpha(colors.heroG3,0.15)}, 0 16px 40px ${alpha(colors.heroG3,0.08)};transform:translateY(-1px)`
      : `background:linear-gradient(160deg, ${colors.heroG1}, ${alpha(colors.heroG2,0.87)});box-shadow:0 2px 4px ${alpha(colors.heroG2,0.13)}, 0 6px 16px ${alpha(colors.heroG2,0.09)}, 0 14px 36px ${alpha(colors.heroG2,0.06)}`;

  return `${header(colors,moment)}
    <button style="width:100%;text-align:center;cursor:pointer;font-family:inherit;position:relative;border-radius:22px;padding:20px 18px 16px;margin-bottom:12px;border:none;${heroStyle}">
      <div style="font-size:28px;margin-bottom:3px">${moment.emoji}</div>
      <div style="font-size:13px;font-weight:700;color:#fff">${moment.text}</div>
      <div style="font-size:36px;font-weight:800;color:#fff;line-height:1;letter-spacing:-1px">${moment.duration}</div>
      <div style="font-size:9px;font-weight:600;color:rgba(255,255,255,0.55);margin-top:2px">${moment.subtitle}</div>
      ${isSleeping?`<div class="pulse-dot" style="background:#fff;position:absolute;top:13px;right:13px;box-shadow:0 0 10px rgba(255,255,255,0.3)"></div>`:''}
    </button>
    ${kpiCards(colors,milk,sleep,night)}
    ${detailSection(colors)}`;
}

// ===================== STYLES =====================
const defaultBg = (colors,night) => night
  ? `linear-gradient(170deg, ${alpha(colors.heroG3,0.38)}, ${colors.bg}, ${alpha(colors.sleep.bg,0.25)})`
  : `linear-gradient(170deg, ${alpha(colors.sleep.bg,0.50)}, ${alpha(colors.heroG1,0.07)}, ${colors.bg}, ${alpha(colors.milk.bg,0.15)})`;
const defaultShadow = (night) => night
  ? '0 8px 34px rgba(0,0,0,0.5)'
  : '0 4px 14px rgba(0,0,0,0.05), 0 14px 44px rgba(80,100,60,0.06)';

const STYLES = [
  { key:'V0', name:'Vanilla', desc:'Baseline — aplats, zéro effet',
    render: renderV0,
    pageBg: (colors,night) => colors.surface,
    phoneSh: (night) => night?'0 8px 32px rgba(0,0,0,0.4)':'0 8px 32px rgba(0,0,0,0.1)' },
  { key:'VC', name:'Élevé', desc:'Hero gradient + forte élévation multi-ombres (pas de border)',
    render: renderVC,
    pageBg: defaultBg, phoneSh: defaultShadow },
];

// ===================== RENDER =====================
function renderTopbar() {
  const colors = getColors(), night = isNight();
  const btnBg = night ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
  const btnColor = night ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.45)';
  const btnActiveBg = night ? 'rgba(120,140,80,0.2)' : 'rgba(90,120,60,0.15)';
  const btnActiveColor = night ? '#98a878' : '#4a5a32';
  const btnActiveBorder = night ? 'rgba(120,140,80,0.35)' : 'rgba(90,120,60,0.3)';
  const separatorColor = night ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';

  document.getElementById('topbar').innerHTML = `
    <h1>Olive & Terre — Hero</h1><div class="ctrl-sep" style="background:${separatorColor}"></div>
    <div class="ctrl-group">${['light','dark'].map(t=>{
      const active = cfg.theme===t;
      const lbl = t==='light'?'☀️ Light':'🌙 Dark';
      return `<button class="ctrl-btn" style="background:${active?btnActiveBg:btnBg};color:${active?btnActiveColor:btnColor};border-color:${active?btnActiveBorder:'transparent'}" onclick="cfg.theme='${t}';render()">${lbl}</button>`;
    }).join('')}</div>
    <div class="ctrl-sep" style="background:${separatorColor}"></div>
    <div class="ctrl-group">${Object.keys(moments).map(k=>{
      const active = cfg.moment===k;
      return `<button class="ctrl-btn" style="background:${active?btnActiveBg:btnBg};color:${active?btnActiveColor:btnColor};border-color:${active?btnActiveBorder:'transparent'}" onclick="cfg.moment='${k}';render()">${moments[k].label}</button>`;
    }).join('')}</div>
    <div class="ctrl-sep" style="background:${separatorColor}"></div>
    <div class="ctrl-group">
      ${['below','in','above'].map(s=>{
        const active = cfg.milkStatus===s;
        const lbl = s==='below'?'🍼↓':s==='in'?'🍼✓':'🍼↑';
        return `<button class="ctrl-btn" style="background:${active?btnActiveBg:btnBg};color:${active?btnActiveColor:btnColor};border-color:${active?btnActiveBorder:'transparent'}" onclick="cfg.milkStatus='${s}';render()">${lbl}</button>`;
      }).join('')}
    </div>
    <div class="ctrl-group">
      ${['below','in','above'].map(s=>{
        const active = cfg.sleepStatus===s;
        const lbl = s==='below'?'😴↓':s==='in'?'😴✓':'😴↑';
        return `<button class="ctrl-btn" style="background:${active?btnActiveBg:btnBg};color:${active?btnActiveColor:btnColor};border-color:${active?btnActiveBorder:'transparent'}" onclick="cfg.sleepStatus='${s}';render()">${lbl}</button>`;
      }).join('')}
    </div>`;
}

function render() {
  const colors = getColors(), moment = getMoment(), night = isNight();
  const milk = milkData(), sleep = sleepData();
  const isSleeping = moment.heroState === 'sleep';

  document.body.style.background = night ? colors.bg : colors.sleep.bg;
  document.body.style.color = colors.text;
  const topbar = document.querySelector('.top-bar');
  topbar.style.background = night ? alpha(colors.surface,0.87) : 'rgba(255,255,255,0.85)';
  topbar.style.borderBottom = `1px solid ${colors.border}`;

  renderTopbar();

  document.getElementById('phones').innerHTML = STYLES.map(S => {
    const pageBg = S.pageBg(colors,night);
    const content = S.render(colors,moment,milk,sleep,isSleeping);

    return `<div class="phone-col">
      <div class="phone-label" style="color:${colors.textSec}">${S.key} — ${S.name}</div>
      <div class="phone-sub" style="color:${colors.textSec}">${S.desc}</div>
      <div class="phone-frame" style="background:${pageBg};box-shadow:${S.phoneSh(night)}">
        <div style="position:absolute;top:10px;left:50%;transform:translateX(-50%);width:84px;height:24px;border-radius:16px;background:rgba(0,0,0,${night?'0.35':'0.08'});z-index:10"></div>
        ${content}
      </div>
    </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
