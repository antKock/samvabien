<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>samvabien — Light / Dark</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
  @property --cd {
    syntax: '<angle>';
    initial-value: 360deg;
    inherits: false;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', system-ui, -apple-system, sans-serif; background: #f0efe8; }

  h1 { text-align: center; font-size: 15px; font-weight: 800; color: #32321e; padding: 20px 0 4px; }

  .phones-row {
    display: flex; justify-content: center; gap: 24px; padding: 16px 16px 40px;
    flex-wrap: wrap; align-items: flex-start;
  }
  .phone-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .phone-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #8a8870; }

  .phone-frame {
    border-radius: 36px; padding: 44px 0 20px; width: 300px;
    overflow: hidden; position: relative;
    aspect-ratio: 9 / 19.5;
  }
  .phone-inner { padding: 0 13px; }
  .status-bar { display: flex; justify-content: space-between; padding: 3px 13px 5px; font-size: 9px; font-weight: 700; opacity: 0.4; }

  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.7); } }

  .progress-track { width: 100%; height: 6px; border-radius: 3px; position: relative; margin-top: 6px; }
  .progress-fill { height: 100%; border-radius: 3px; position: absolute; left: 0; top: 0; }
  .progress-marker {
    position: absolute; top: -3px; width: 12px; height: 12px; border-radius: 50%;
    transform: translateX(-50%); border: 2px solid; box-sizing: border-box;
  }

  .section-title {
    font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
    color: #8a8870; text-align: center; padding: 32px 0 8px;
    border-top: 1px solid rgba(0,0,0,0.08); margin: 0 40px;
  }
  .section-title:first-of-type { border-top: none; }

  .cards-row {
    display: flex; justify-content: center; gap: 16px; padding: 8px 16px 40px;
    flex-wrap: wrap; align-items: flex-start;
  }
  .card-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .card-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #8a8870; }
  .card-wrap {
    border-radius: 22px; padding: 6px; width: 260px;
  }

  .flow-row {
    display: flex; justify-content: center; align-items: center; gap: 8px; padding: 8px 16px 40px;
    flex-wrap: wrap;
  }
  .flow-arrow {
    font-size: 18px; color: #8a8870; opacity: 0.5; line-height: 1;
  }
  .flow-time {
    font-size: 9px; font-weight: 700; color: #8a8870; text-align: center; margin-bottom: 2px;
  }

  .transitions-row {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    padding: 8px 16px 40px;
  }
  .transition-group {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center;
  }
  .transition-label {
    font-size: 9px; font-weight: 700; color: #8a8870; text-align: center; margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .confirm-card {
    border-radius: 18px; padding: 16px 16px 18px; width: 240px;
    display: flex; align-items: center; gap: 10px;
  }

  .toast-wrap {
    position: absolute; bottom: 16px; left: 13px; right: 13px; z-index: 20;
  }
  .toast {
    border-radius: 18px; padding: 16px 16px 20px; position: relative;
    animation: toast-enter 350ms ease-out;
  }
  @keyframes toast-enter {
    0%   { opacity: 0; transform: translateY(12px); filter: saturate(1.6) brightness(1.05); }
    60%  { opacity: 1; transform: translateY(-2px); filter: saturate(1.3) brightness(1.02); }
    100% { opacity: 1; transform: translateY(0); filter: saturate(1) brightness(1); }
  }
  .toast-cooldown {
    position: absolute; inset: -1px; border-radius: 18px; pointer-events: none; z-index: 1;
    border: 2.5px solid var(--cooldown-color);
    -webkit-mask: conic-gradient(from 0deg at 50% 50%, #000 0deg, #000 var(--cd), transparent var(--cd));
    mask: conic-gradient(from 0deg at 50% 50%, #000 0deg, #000 var(--cd), transparent var(--cd));
    animation: cooldown-clock 5s linear forwards;
  }
  @keyframes cooldown-clock {
    from { --cd: 360deg; }
    to   { --cd: 0deg; }
  }
  .toast-cancel {
    position: absolute; top: 10px; right: 10px;
    width: 28px; height: 28px; border-radius: 50%; border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600;
    padding: 4px 0 0 0; line-height: 1; z-index: 2;
  }
  .toast-time-btn {
    width: 32px; height: 28px; border-radius: 8px; border: none;
    font-size: 11px; font-weight: 800; cursor: pointer; font-family: inherit;
    position: relative;
  }
  .toast-time-btn::before {
    content: ''; position: absolute; inset: -8px; border-radius: 16px;
  }
  .toast-alt {
    font-size: 11px; font-weight: 700; border: none; border-radius: 8px;
    padding: 6px 12px; cursor: pointer; font-family: inherit;
  }
</style>
</head>
<body>

<h1>samvabien — Design Reference</h1>

<h2 class="section-title">Vue complète</h2>
<div class="phones-row" id="phones"></div>

<h2 class="section-title">Hero Card — Journée type</h2>
<div class="flow-row" id="hero-flow"></div>

<h2 class="section-title">Hero Tap — Transitions sommeil</h2>
<div class="transitions-row" id="hero-transitions"></div>

<h2 class="section-title">Toast — En contexte</h2>
<div class="phones-row" id="toast-demo"></div>

<h2 class="section-title">Time Picker — Rouleaux</h2>
<div class="phones-row" id="picker-demo"></div>

<script>
const COLORS = {
  day: {
    bg:'#f6f5ee', surface:'#ffffff', text:'#32321e', textSec:'#8a8870',
    sleep:   { bg:'#eaecda', accent:'#8a9a6a', icon:'#6a7a4a' },
    milk:    { bg:'#f5e6d6', accent:'#c08a60', icon:'#a06840' },
    hero:    { text:'#4a5a32', dot:'#8a9a6a' },
    inRange: { accent:'#8a9a5a' },
    rangeBg:'rgba(120,130,80,0.15)', rangeBorder:'rgba(120,130,80,0.28)',
    border:'rgba(0,0,0,0.06)',
    track:'#dce0cc',
    heroG1:'#b8c4a0', heroG3:'#587044',
  },
  night: {
    bg:'#181810', surface:'#22221a', text:'#c8c8b0', textSec:'#7a7a60',
    sleep:   { bg:'#222818', accent:'#7a8a5a', icon:'#98a878' },
    milk:    { bg:'#261e14', accent:'#b08050', icon:'#cca070' },
    hero:    { text:'#98a878', dot:'#7a8a5a' },
    inRange: { accent:'#7a8a4a' },
    rangeBg:'rgba(100,110,60,0.2)', rangeBorder:'rgba(100,110,60,0.3)',
    border:'rgba(255,255,255,0.06)',
    track:'#222618',
    heroG1:'#4a5434', heroG3:'#1a2210',
  }
};

const moment = { time:'15:53', emoji:'😴', text:'Dort depuis', duration:'1h23', subtitle:'Endormi à 14h30' };
const milk  = { value:'480 mL', fill:55, avg:60, inRange:true };
const sleep = { value:'12h40', fill:68, avg:62, inRange:true };

const alpha = (hex, a) => {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
};

function checkmark(colors, inRange) {
  if (!inRange) return '';
  return `<span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:${colors.inRange.accent};color:#fff;font-size:9px;font-weight:800">✓</span>`;
}

function progressBar(colors, catColor, fillPct, avgPct, inRange) {
  const fillColor = inRange ? colors.inRange.accent : catColor;
  return `<div class="progress-track" style="background:${colors.track}">
    <div style="position:absolute;left:52%;width:36%;height:100%;background:${colors.rangeBg};border-radius:3px;border:1px solid ${colors.rangeBorder}"></div>
    <div class="progress-fill" style="width:${fillPct}%;background:${fillColor};opacity:${inRange?0.8:0.5}"></div>
    <div class="progress-marker" style="left:${avgPct}%;background:${colors.rangeBorder};border-color:${colors.rangeBorder}"></div>
    <div style="position:absolute;top:-2px;left:${fillPct}%;width:10px;height:10px;border-radius:50%;transform:translateX(-50%);background:${colors.surface};box-shadow:0 0 0 1.5px ${fillColor}"></div>
  </div>`;
}

function detailRows(colors) {
  const items = [
    { dot:colors.sleep.accent, label:'Sieste',  time:'14h30',      value:'1h23',   color:colors.sleep.icon },
    { dot:colors.milk.accent,  label:'Biberon', time:'12h15',      value:'150 mL', color:colors.milk.icon },
    { dot:colors.sleep.accent, label:'Sieste',  time:'matin',      value:'1h00',   color:colors.sleep.icon },
    { dot:colors.milk.accent,  label:'Biberon', time:'matin',      value:'180 mL', color:colors.milk.icon },
    { dot:colors.sleep.accent, label:'Nuit',    time:'19h30→5h50', value:'10h20',  color:colors.sleep.icon },
  ];
  return items.map(i=>`<div style="border-bottom:1px solid ${colors.border}"><div style="display:flex;align-items:center;gap:7px;padding:6px 0">
    <div style="width:5px;height:5px;border-radius:50%;background:${i.dot}"></div>
    <div style="font-size:10px;font-weight:600;color:${colors.text};flex:1">${i.label}</div>
    <div style="font-size:9px;font-weight:600;color:${colors.textSec};width:60px;text-align:right">${i.time}</div>
    <div style="font-size:10px;font-weight:700;color:${i.color};width:46px">${i.value}</div>
  </div></div>`).join('');
}

function headerHtml(colors) {
  return `<div class="status-bar" style="color:${colors.textSec}"><span>${moment.time}</span><span>📶 🔋</span></div>
  <div class="phone-inner">
    <div style="padding:2px 0 6px">
      <div style="font-size:9px;font-weight:600;color:${colors.textSec}">Vendredi 7 mars</div>
    </div>`;
}

function detailSection(colors) {
  return `<div style="border-top:1px solid ${colors.border};padding-top:8px">
    <div style="font-size:8px;font-weight:700;color:${colors.textSec};text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px">Aujourd'hui</div>
    ${detailRows(colors)}
  </div></div>`;
}

function kpiCards(colors, night) {
  const milkStyle = night
    ? `background:linear-gradient(165deg, ${colors.milk.bg}, ${alpha(colors.milk.accent,0.06)});border:1px solid ${alpha(colors.milk.accent,0.08)};border-bottom:2.5px solid ${alpha(colors.milk.accent,0.38)};box-shadow:inset 0 1px 0 rgba(255,255,255,0.04), 0 3px 12px ${alpha(colors.milk.accent,0.06)}`
    : `background:linear-gradient(165deg, ${colors.milk.bg}, ${alpha(colors.milk.accent,0.03)});border:1px solid ${alpha(colors.milk.accent,0.06)};border-bottom:2.5px solid ${alpha(colors.milk.accent,0.25)};box-shadow:inset 0 1px 0 rgba(255,255,255,0.35), 0 3px 12px ${alpha(colors.milk.accent,0.02)}`;
  const sleepStyle = night
    ? `background:linear-gradient(165deg, ${colors.sleep.bg}, ${alpha(colors.sleep.accent,0.06)});border:1px solid ${alpha(colors.sleep.accent,0.08)};border-bottom:2.5px solid ${alpha(colors.sleep.accent,0.38)};box-shadow:inset 0 1px 0 rgba(255,255,255,0.04), 0 3px 12px ${alpha(colors.sleep.accent,0.06)}`
    : `background:linear-gradient(165deg, ${colors.sleep.bg}, ${alpha(colors.sleep.accent,0.03)});border:1px solid ${alpha(colors.sleep.accent,0.06)};border-bottom:2.5px solid ${alpha(colors.sleep.accent,0.25)};box-shadow:inset 0 1px 0 rgba(255,255,255,0.35), 0 3px 12px ${alpha(colors.sleep.accent,0.02)}`;
  const ctaStyle = (ic) => `width:30px;height:30px;border-radius:10px;border:none;font-size:14px;font-weight:800;cursor:pointer;background:${alpha(ic,0.08)};color:${ic};box-shadow:inset 0 1px 0 rgba(255,255,255,${night?'0.05':'0.2'}), 0 2px 4px ${alpha(ic,0.06)}`;

  return `
    <div style="border-radius:18px;padding:11px 11px 11px 14px;margin-bottom:8px;${milkStyle}">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="font-size:16px">🍼</div>
        <div style="flex:1">
          <div style="font-size:8px;font-weight:600;color:${colors.milk.icon}">Lait aujourd'hui</div>
          <div style="display:flex;align-items:center;gap:4px">
            <div style="font-size:22px;font-weight:800;color:${colors.text};line-height:1.1">${milk.value}</div>
            ${checkmark(colors,milk.inRange)}
          </div>
        </div>
        <button style="${ctaStyle(colors.milk.icon)}">+</button>
      </div>
      ${progressBar(colors,colors.milk.accent,milk.fill,milk.avg,milk.inRange)}
    </div>
    <div style="border-radius:18px;padding:11px 11px 11px 14px;margin-bottom:10px;${sleepStyle}">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="font-size:16px">😴</div>
        <div style="flex:1">
          <div style="font-size:8px;font-weight:600;color:${colors.sleep.icon}">Sommeil total</div>
          <div style="display:flex;align-items:center;gap:4px">
            <div style="font-size:22px;font-weight:800;color:${colors.text};line-height:1.1">${sleep.value}</div>
            ${checkmark(colors,sleep.inRange)}
          </div>
        </div>
        <button style="${ctaStyle(colors.sleep.icon)}">+</button>
      </div>
      ${progressBar(colors,colors.sleep.accent,sleep.fill,sleep.avg,sleep.inRange)}
    </div>`;
}

function render(colors, night) {
  const heroStyle = night
    ? `background:linear-gradient(155deg, ${colors.heroG1}, ${colors.heroG3});box-shadow:0 2px 6px ${alpha(colors.heroG3,0.21)}, 0 8px 22px ${alpha(colors.heroG3,0.15)}, 0 18px 44px ${alpha(colors.heroG3,0.09)};transform:translateY(-1px)`
    : `background:linear-gradient(160deg, ${alpha(colors.heroG1,0.93)}, ${colors.heroG3});box-shadow:0 2px 6px ${alpha(colors.heroG3,0.19)}, 0 8px 20px ${alpha(colors.heroG3,0.15)}, 0 16px 40px ${alpha(colors.heroG3,0.08)};transform:translateY(-1px)`;

  return `${headerHtml(colors)}
    <button style="width:100%;text-align:center;cursor:pointer;font-family:inherit;position:relative;border-radius:22px;padding:20px 18px 16px;margin-bottom:12px;border:none;${heroStyle}">
      <div style="font-size:28px;margin-bottom:3px">${moment.emoji}</div>
      <div style="font-size:13px;font-weight:700;color:${night ? colors.hero.text : colors.sleep.bg}">${moment.text}</div>
      <div style="font-size:36px;font-weight:800;color:${night ? colors.hero.text : colors.sleep.bg};line-height:1;letter-spacing:-1px">${moment.duration}</div>
      <div style="font-size:9px;font-weight:600;color:${night ? colors.hero.text : alpha(colors.sleep.bg,0.65)};margin-top:2px">${moment.subtitle}</div>
      <div class="pulse-dot" style="background:${night ? colors.hero.dot : colors.sleep.bg};position:absolute;top:13px;right:13px;box-shadow:0 0 10px ${night ? alpha(colors.hero.dot,0.3) : alpha(colors.sleep.bg,0.3)}"></div>
    </button>
    ${kpiCards(colors,night)}
    ${detailSection(colors)}`;
}

// ===================== STATIC 2-VIEW RENDER =====================
const dayC = COLORS.day;
const nightC = COLORS.night;

const bgDay = `${dayC.bg} linear-gradient(170deg, ${alpha(dayC.sleep.bg,0.50)}, ${alpha(dayC.heroG1,0.07)}, ${dayC.bg}, ${alpha(dayC.milk.bg,0.15)})`;
const bgNight = `${nightC.bg} linear-gradient(170deg, ${alpha(nightC.heroG3,0.38)}, ${nightC.bg}, ${alpha(nightC.sleep.bg,0.25)})`;

const VIEWS = [
  { label: 'Light',  content: render(dayC, false),   bg: bgDay,   shadow: '0 4px 14px rgba(0,0,0,0.05), 0 14px 44px rgba(80,100,60,0.06)', notch: '0.08' },
  { label: 'Dark',   content: render(nightC, true),   bg: bgNight, shadow: '0 8px 34px rgba(0,0,0,0.5)',   notch: '0.35' },
];

document.getElementById('phones').innerHTML = VIEWS.map(v => `
  <div class="phone-col">
    <div class="phone-label">${v.label}</div>
    <div class="phone-frame" style="background:${v.bg};box-shadow:${v.shadow}">
      <div style="position:absolute;top:10px;left:50%;transform:translateX(-50%);width:84px;height:24px;border-radius:16px;background:rgba(0,0,0,${v.notch});z-index:10"></div>
      ${v.content}
    </div>
  </div>
`).join('');

// ===================== HERO CARD — JOURNÉE TYPE =====================
// Matin → Sieste → Éveil → Sieste → Éveil → Nuit → Réveil nocturne → Rendormi → Matin
const HERO_FLOW = [
  { time:'6h00',  key:'awake',       emoji:'☀️', text:'Éveillé depuis',  duration:'0h10',  subtitle:'Réveillé à 5h50' },
  { time:'9h30',  key:'nap',         emoji:'😴', text:'Dort depuis',      duration:'1h00',  subtitle:'Endormi à 9h30' },
  { time:'10h30', key:'awake',       emoji:'☀️', text:'Éveillé depuis',  duration:'3h30',  subtitle:'Réveillé à 10h30' },
  { time:'14h30', key:'nap',         emoji:'😴', text:'Dort depuis',      duration:'1h23',  subtitle:'Endormi à 14h30' },
  { time:'15h53', key:'awake',       emoji:'☀️', text:'Éveillé depuis',  duration:'2h10',  subtitle:'Réveillé à 15h53' },
  { time:'19h30', key:'night',       emoji:'🌙', text:'Dort depuis',      duration:'4h30',  subtitle:'Couché à 19h30' },
  { time:'3h15',  key:'night-wake',  emoji:'🫣', text:'Éveillé depuis',  duration:'0h12',  subtitle:'Réveillé à 3h15' },
  { time:'3h27',  key:'night-sleep', emoji:'🌙', text:'Dort depuis',      duration:'2h23',  subtitle:'Rendormi à 3h27' },
  { time:'5h50',  key:'awake',       emoji:'☀️', text:'Éveillé depuis',  duration:'0h10',  subtitle:'Réveillé à 5h50' },
];

function heroCard(colors, night, state) {
  const heroStyle = night
    ? `background:linear-gradient(155deg, ${colors.heroG1}, ${colors.heroG3});box-shadow:0 2px 6px ${alpha(colors.heroG3,0.21)}, 0 8px 22px ${alpha(colors.heroG3,0.15)}, 0 18px 44px ${alpha(colors.heroG3,0.09)}`
    : `background:linear-gradient(160deg, ${alpha(colors.heroG1,0.93)}, ${colors.heroG3});box-shadow:0 2px 6px ${alpha(colors.heroG3,0.19)}, 0 8px 20px ${alpha(colors.heroG3,0.15)}, 0 16px 40px ${alpha(colors.heroG3,0.08)}`;
  const textColor = night ? colors.hero.text : colors.sleep.bg;
  const subColor = night ? colors.hero.text : alpha(colors.sleep.bg, 0.65);
  const dotColor = night ? colors.hero.dot : colors.sleep.bg;

  return `<div style="width:100%;text-align:center;position:relative;border-radius:22px;padding:20px 18px 16px;${heroStyle}">
    <div style="font-size:28px;margin-bottom:3px">${state.emoji}</div>
    <div style="font-size:13px;font-weight:700;color:${textColor}">${state.text}</div>
    <div style="font-size:36px;font-weight:800;color:${textColor};line-height:1;letter-spacing:-1px">${state.duration}</div>
    <div style="font-size:9px;font-weight:600;color:${subColor};margin-top:2px">${state.subtitle}</div>
    <div class="pulse-dot" style="background:${dotColor};position:absolute;top:13px;right:13px;box-shadow:0 0 10px ${alpha(dotColor,0.3)}"></div>
  </div>`;
}

const flowHtml = HERO_FLOW.map((state, i) => {
  const isNight = state.key.startsWith('night');
  const colors = isNight ? nightC : dayC;
  const wrapBg = isNight ? nightC.bg : dayC.bg;
  const arrow = i < HERO_FLOW.length - 1 ? '<div class="flow-arrow">→</div>' : '';
  return `<div class="card-col">
    <div class="flow-time">${state.time}</div>
    <div class="card-wrap" style="background:${wrapBg}">
      ${heroCard(colors, isNight, state)}
    </div>
  </div>${arrow}`;
}).join('');

document.getElementById('hero-flow').innerHTML = flowHtml;

// ===================== HERO TAP — TRANSITIONS =====================
function confirmCard(colors, night, emoji, text, time, alt) {
  const bg = colors.sleep.bg;
  const border = colors.sleep.accent;
  const textC = colors.text;
  const btnBg = alpha(colors.sleep.accent, 0.15);
  const btnC = colors.sleep.icon;

  return `<div>
    <div class="confirm-card" style="background:${bg};border:1.5px solid ${alpha(border,0.3)};flex-direction:column;align-items:stretch;gap:6px;position:relative">
      <button class="toast-cancel" style="background:${btnBg};color:${btnC};top:8px;right:8px;width:24px;height:24px;font-size:12px">↩</button>
      <div style="text-align:center;margin-bottom:4px">
        <div style="font-size:14px;font-weight:800;color:${textC}">${emoji} ${text}</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:center;gap:8px">
        <button class="toast-time-btn" style="background:${btnBg};color:${btnC}">-1</button>
        <div style="font-size:16px;font-weight:800;color:${textC};min-width:54px;text-align:center">${time}</div>
        <button class="toast-time-btn" style="background:${btnBg};color:${btnC}">+1</button>
      </div>
      ${alt ? `<div style="text-align:center;margin-top:4px">
        <button class="toast-alt" style="background:${btnBg};color:${btnC}">${alt}</button>
      </div>` : ''}
    </div>
  </div>`;
}

const TRANSITIONS = [
  {
    label: 'Éveillé → Sieste (6h–17h)',

// ===================== TOAST — EN CONTEXTE =====================
function toastOverlay(colors, night, emoji, text, time, alt) {
  const bg = colors.sleep.bg;
  const border = colors.sleep.accent;
  const textC = colors.text;
  const btnBg = alpha(colors.sleep.accent, 0.15);
  const btnC = colors.sleep.icon;
  const cooldownColor = colors.sleep.accent;

  return `<div class="toast-wrap">
    <div class="toast" style="background:${bg};border:1.5px solid ${alpha(border,0.3)};box-shadow:0 -4px 20px ${alpha(border,0.15)};--cooldown-color:${cooldownColor}">
      <button class="toast-cancel" style="background:${btnBg};color:${btnC}">↩</button>
      <div style="text-align:center;margin-bottom:14px">
        <div style="font-size:14px;font-weight:800;color:${textC}">${emoji} ${text}</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:center;gap:8px">
        <button class="toast-time-btn" style="background:${btnBg};color:${btnC}">-1</button>
        <div style="font-size:16px;font-weight:800;color:${textC};min-width:54px;text-align:center">${time}</div>
        <button class="toast-time-btn" style="background:${btnBg};color:${btnC}">+1</button>
      </div>
      ${alt ? `<div style="text-align:center;margin-top:10px">
        <button class="toast-alt" style="background:${btnBg};color:${btnC}">${alt}</button>
      </div>` : ''}
      <div class="toast-cooldown"></div>
    </div>
  </div>`;
}

// ===================== TIME PICKER — OPTIONS =====================

function pickerWheels(colors, night, title, hoursData, minsData) {
  const bg = colors.sleep.bg;
  const border = colors.sleep.accent;
  const textC = colors.text;
  const btnBg = alpha(colors.sleep.accent, 0.15);
  const btnC = colors.sleep.icon;
  const cooldownColor = colors.sleep.accent;
  const selBg = alpha(colors.sleep.accent, 0.13);

  const wheelItem = (val, selected) => {
    const op = selected ? '1' : '0.3';
    const fw = selected ? '800' : '600';
    const fs = selected ? '24px' : '15px';
    return `<div style="font-size:${fs};font-weight:${fw};color:${textC};opacity:${op};padding:6px 0;text-align:center">${val}</div>`;
  };

  return `<div class="toast-wrap">
    <div class="toast" style="background:${bg};border:1.5px solid ${alpha(border,0.3)};box-shadow:0 -4px 20px ${alpha(border,0.15)};--cooldown-color:${cooldownColor}">
      <button class="toast-cancel" style="background:${btnBg};color:${btnC}">↩</button>
      <div style="text-align:center;margin-bottom:14px">
        <div style="font-size:14px;font-weight:800;color:${textC}">${title}</div>
      </div>
      <div style="display:flex;justify-content:center;gap:6px;margin-bottom:14px;position:relative">
        <div style="position:absolute;top:50%;left:16px;right:16px;height:38px;transform:translateY(-50%);background:${selBg};border-radius:12px;pointer-events:none"></div>
        <div style="width:84px;overflow:hidden;position:relative;z-index:1">
          <div style="position:absolute;inset:0;pointer-events:none;
            background:linear-gradient(${bg}, transparent 28%, transparent 72%, ${bg});z-index:2"></div>
          <div style="display:flex;flex-direction:column;align-items:center">
            ${hoursData.map((h,i) => wheelItem(h+'h', i===2)).join('')}
          </div>
        </div>
        <div style="font-size:24px;font-weight:800;color:${textC};align-self:center;opacity:0.3;z-index:1">:</div>
        <div style="width:84px;overflow:hidden;position:relative;z-index:1">
          <div style="position:absolute;inset:0;pointer-events:none;
            background:linear-gradient(${bg}, transparent 28%, transparent 72%, ${bg});z-index:2"></div>
          <div style="display:flex;flex-direction:column;align-items:center">
            ${minsData.map((m,i) => wheelItem(m, i===2)).join('')}
          </div>
        </div>
      </div>
      <div style="display:flex;justify-content:center;margin-top:4px">
        <button style="background:${btnBg};color:${btnC};border:none;border-radius:10px;padding:8px 28px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit">OK</button>
      </div>
    </div>
  </div>`;
}

const pickerLightContent = render(dayC, false) + pickerWheels(dayC, false, '😴 Sieste démarrée', [12,13,14,15,16], ['05','06','07','08','09']);
const pickerDarkContent = render(nightC, true) + pickerWheels(nightC, true, '🫣 Réveil nocturne', [1,2,3,4,5], ['15','16','17','18','19']);

];

`).join('');
