<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>samvabien — Layout Configurator v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', system-ui, -apple-system, sans-serif; background: #f0edf3; color: #2d2235; }

  .layout { display: flex; min-height: 100vh; }

  .sidebar {
    width: 260px; min-width: 260px; padding: 20px 16px;
    background: #ffffff; border-right: 1px solid #e8e4ec;
    overflow-y: auto; position: sticky; top: 0; height: 100vh;
  }
  .sidebar h1 { font-size: 15px; font-weight: 800; margin-bottom: 16px; color: #2d2235; }
  .cfg-section { margin-bottom: 20px; }
  .cfg-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; color: #8a7a96; margin-bottom: 8px;
  }
  .cfg-group { display: flex; flex-direction: column; gap: 4px; }
  .cfg-btn {
    padding: 8px 12px; border-radius: 10px; border: 1.5px solid transparent;
    font-family: inherit; font-size: 12px; font-weight: 700;
    cursor: pointer; transition: all 0.15s; text-align: left;
    background: #f8f6fa; color: #5a4a6a; display: flex; align-items: center; gap: 8px;
  }
  .cfg-btn:hover { background: #f0ecf4; }
  .cfg-btn.active { background: #e8f5e9; color: #3a6a3a; border-color: #8ab88a; }
  .cfg-btn .swatch { width: 14px; height: 14px; border-radius: 6px; flex-shrink: 0; }
  .cfg-btn .swatch-duo { display: flex; gap: 2px; }
  .cfg-btn .swatch-duo span { width: 7px; height: 14px; border-radius: 3px; }
  .cfg-row { display: flex; gap: 4px; }
  .cfg-row .cfg-btn { flex: 1; text-align: center; padding: 7px 4px; font-size: 11px; justify-content: center; }
  .cfg-divider { height: 1px; background: #e8e4ec; margin: 16px 0; }

  .main { flex: 1; padding: 24px; display: flex; flex-direction: column; align-items: center; }
  .main h2 { font-size: 15px; font-weight: 800; margin: 28px 0 6px; width: 100%; max-width: 430px; transition: color 0.3s; }

  .phone-frame {
    border-radius: 40px; padding: 48px 0 24px; width: 100%; max-width: 375px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    margin: 12px 0; overflow: hidden; position: relative;
    transition: background 0.3s, box-shadow 0.3s;
    aspect-ratio: 9 / 19.5;
  }
  .phone-frame::before {
    content: ''; position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 100px; height: 28px; border-radius: 20px;
    background: rgba(0,0,0,0.08); z-index: 10;
  }
  .phone-inner { padding: 0 16px; }
  .status-bar { display: flex; justify-content: space-between; padding: 4px 16px 8px; font-size: 11px; font-weight: 700; opacity: 0.4; }

  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.7); } }

  .progress-track { width: 100%; height: 8px; border-radius: 4px; position: relative; margin-top: 8px; }
  .progress-fill { height: 100%; border-radius: 4px; }
  .progress-marker {
    position: absolute; top: -4px; width: 16px; height: 16px; border-radius: 50%;
    transform: translateX(-50%); border: 2.5px solid; box-sizing: border-box;
  }
  .kpi-cta {
    width: 36px; height: 36px; border-radius: 12px; border: none;
    font-size: 14px; font-weight: 800; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .hero-btn {
    border: none; width: 100%; text-align: center;
    cursor: pointer; transition: all 0.15s; position: relative; font-family: inherit;
  }
  .hero-btn:active { transform: scale(0.98); }

  .bs-overlay {
    border-radius: 20px 20px 0 0; padding: 20px 16px 16px;
    margin-top: 12px; transition: background 0.3s; width: 100%; max-width: 430px;
  }
  .bs-handle { width: 36px; height: 4px; border-radius: 2px; margin: 0 auto 14px; }
  .slider-track {
    width: 100%; height: 44px; border-radius: 14px; position: relative;
    display: flex; align-items: center; cursor: pointer; margin: 8px 0 0;
  }
  .slider-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 14px; }
  .slider-thumb {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 28px; height: 28px; border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15); cursor: grab; z-index: 2;
  }
  .slider-labels { display: flex; justify-content: space-between; font-size: 10px; font-weight: 600; margin-top: 3px; }

  .hero-opt-mini {
    padding: 6px 12px; border-radius: 10px; border: none;
    font-family: inherit; font-size: 11px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }

  .time-chips { display: flex; gap: 6px; margin: 10px 0 0; }
  .time-chip {
    flex: 1; padding: 8px 4px; border-radius: 10px; border: 1.5px solid;
    font-family: inherit; font-size: 11px; font-weight: 700;
    cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .time-chip.selected { transform: scale(1.02); }

  .ux-note {
    border-radius: 12px; padding: 12px 14px; margin-top: 14px;
    font-size: 10px; font-weight: 600; line-height: 1.5;
  }
  .ux-note strong { font-weight: 800; display: block; margin-bottom: 2px; }

  @media (max-width: 720px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; min-width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid #e8e4ec; }
    .cfg-group { flex-direction: row; flex-wrap: wrap; }
    .cfg-section { margin-bottom: 12px; }
  }
</style>
</head>
<body>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main-area">
    <div class="phone-frame" id="phone"></div>

    <h2 id="h2-qa">Interactions KPI card (tap = ajout précis · ++ = chaîne)</h2>
    <div class="bs-overlay" id="bs-quick"></div>

    <h2 id="h2-hero">Hero tap — Transition</h2>
    <div class="bs-overlay" id="bs-hero"></div>
  </div>
</div>

      inRange:{accent:'#5a9a5a',text:'#7aba7a',glow:'rgba(90,154,90,0.1)'},

    night: { bg:'#0e1a14',surface:'#16241c',text:'#b4d0be',textSoft:'#5a7e68',
      sleep:{bg:'#142818',accent:'#6a9a78',icon:'#88b898'},milk:{bg:'#241c18',accent:'#d89070',icon:'#e8a888'},
      primary:{bg:'#2e5e42',text:'#ffffff'},secondary:{bg:'#142818',text:'#6a9a78'},
      active:{bg:'#1a3020',dot:'#6a9a78',text:'#88b898'},
      inRange:{accent:'#4a8a5a',text:'#6aaa7a',glow:'rgba(74,138,90,0.1)'},

    day: { bg:'#f0faf6',surface:'#ffffff',text:'#1e3830',textSoft:'#6a9088',
      sleep:{bg:'#dcf2ea',accent:'#6ab8a0',icon:'#48968e'},milk:{bg:'#f0e8f8',accent:'#b8a0d0',icon:'#9478b0'},
      primary:{bg:'#48968e',text:'#ffffff'},secondary:{bg:'#dcf2ea',text:'#48968e'},

      trackBg:'#cce4dc',avgLine:'#88b4a8',rangeBg:'rgba(60,140,120,0.18)',rangeBorder:'rgba(60,140,120,0.3)',ctaBg:'rgba(106,184,160,0.2)'},
    night: { bg:'#0c1a16',surface:'#142420',text:'#a8d0c4',textSoft:'#5a8a80',
      sleep:{bg:'#102a22',accent:'#5aa890',icon:'#78c4b0'},milk:{bg:'#1e1828',accent:'#a890c0',icon:'#bea8d4'},
      primary:{bg:'#2e7a6a',text:'#ffffff'},secondary:{bg:'#102a22',text:'#5aa890'},

      trackBg:'#102418',avgLine:'#3a7a6a',rangeBg:'rgba(50,120,100,0.2)',rangeBorder:'rgba(50,120,100,0.3)',ctaBg:'rgba(90,168,144,0.2)'}},

  B4: { name: 'Olive & Terre', swatch: '#8a9a6a', swatch2: '#c89070',
    day: { bg:'#f8f7f0',surface:'#ffffff',text:'#32321e',textSoft:'#8a8870',
      sleep:{bg:'#eceedc',accent:'#8a9a6a',icon:'#6a7a4a'},milk:{bg:'#fbe8da',accent:'#c89070',icon:'#a87050'},
      primary:{bg:'#6a7a4a',text:'#ffffff'},secondary:{bg:'#eceedc',text:'#6a7a4a'},
      active:{bg:'#e0e4cc',dot:'#8a9a6a',text:'#4a5a32'},
      inRange:{accent:'#6aaa5a',text:'#3a7a2a',glow:'rgba(106,170,90,0.15)'},
      border:'rgba(0,0,0,0.06)',handle:'rgba(0,0,0,0.12)',
      trackBg:'#dce0cc',avgLine:'#a0a88c',rangeBg:'rgba(100,120,70,0.18)',rangeBorder:'rgba(100,120,70,0.3)',ctaBg:'rgba(138,154,106,0.2)'},
    night: { bg:'#181810',surface:'#22221a',text:'#c8c8b0',textSoft:'#7a7a60',
      sleep:{bg:'#222818',accent:'#7a8a5a',icon:'#98a878'},milk:{bg:'#261e18',accent:'#b88060',icon:'#d0a080'},
      primary:{bg:'#4a5a32',text:'#ffffff'},secondary:{bg:'#222818',text:'#7a8a5a'},
      active:{bg:'#282e1c',dot:'#7a8a5a',text:'#98a878'},
      inRange:{accent:'#5a9a4a',text:'#7aba6a',glow:'rgba(90,154,74,0.1)'},
      border:'rgba(255,255,255,0.06)',handle:'rgba(255,255,255,0.12)',
      trackBg:'#222618',avgLine:'#5a6a48',rangeBg:'rgba(80,100,60,0.2)',rangeBorder:'rgba(80,100,60,0.3)',ctaBg:'rgba(122,138,90,0.2)'}},
};

const moments = {
  morning:   { label:'Matin',      time:'8:30',  greeting:'Bonjour', mode:'day',   hero:'awake', emoji:'🌤️', text:'Sam est réveillé', timer:'2h40', sub:'Éveillé depuis 5h50' },
  midday:    { label:'Midi',       time:'12:15', greeting:'Bonjour', mode:'day',   hero:'awake', emoji:'🌤️', text:'Sam est réveillé', timer:'1h15', sub:'Éveillé depuis 11h00' },
  afternoon: { label:'Après-midi', time:'15:53', greeting:'Bonjour', mode:'day',   hero:'sleep', emoji:'😴',  text:'Sam dort',         timer:'1h23', sub:'Endormi à 14h30' },
  evening:   { label:'Soir',       time:'18:45', greeting:'Bonsoir', mode:'night', hero:'awake', emoji:'🌤️', text:'Sam est réveillé', timer:'2h15', sub:'Éveillé depuis 16h30' },
  night:     { label:'Nuit',       time:'3:12',  greeting:'',        mode:'night', hero:'night', emoji:'💤',  text:'Sam dort',         timer:'7h42', sub:'Couché à 19h30 · 0 réveil' },
};

function isNight() { return moments[cfg.moment].mode === 'night'; }
function t() { return palettes[cfg.theme][isNight() ? 'night' : 'day']; }
function mom() { return moments[cfg.moment]; }
function isNightMode() { return cfg.moment === 'night'; }

function momentProgress() {
  const m = cfg.moment;
  if (m === 'morning') return { milkPct: 15, sleepPct: 12, milkAvg: 18, sleepAvg: 10 };
  if (m === 'midday')  return { milkPct: 38, sleepPct: 42, milkAvg: 42, sleepAvg: 38 };
  if (m === 'afternoon') return { milkPct: 55, sleepPct: 68, milkAvg: 60, sleepAvg: 62 };
  if (m === 'evening') return { milkPct: 72, sleepPct: 85, milkAvg: 78, sleepAvg: 80 };
  return { milkPct: 82, sleepPct: 95, milkAvg: 88, sleepAvg: 90 };
}
function milkData() {
  const s = cfg.milkStatus;
  const mp = momentProgress();
  if (s === 'below') return { val:'280 mL', fill: Math.max(mp.milkPct - 15, 5), avg: mp.milkAvg, inR:false };
  if (s === 'in')    return { val:'480 mL', fill: mp.milkPct, avg: mp.milkAvg, inR:true };
  return                     { val:'720 mL', fill: Math.min(mp.milkPct + 25, 98), avg: mp.milkAvg, inR:false };
}
function sleepData() {
  const s = cfg.sleepStatus;
  const mp = momentProgress();
  if (s === 'below') return { val:'8h20', fill: Math.max(mp.sleepPct - 20, 5), avg: mp.sleepAvg, inR:false };
  if (s === 'in')    return { val:'12h40', fill: mp.sleepPct, avg: mp.sleepAvg, inR:true };
  return                     { val:'16h10', fill: Math.min(mp.sleepPct + 15, 98), avg: mp.sleepAvg, inR:true };
}

function statusLabel(cc, inR) {
  if (!inR) return '';
  return `<span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:${cc.inRange.accent};color:#fff;font-size:13px;font-weight:800;line-height:1;vertical-align:middle" title="Dans la norme théorique">✓</span>`;
}

function progressBar(catColor, fillPct, avgPct, inR) {
  const cc = t();
  const fc = inR ? cc.inRange.accent : catColor;
  const fo = inR ? '0.75' : '0.5';
  return `<div class="progress-track" style="background:${cc.trackBg}">
    <div style="position:absolute;left:52%;width:36%;height:100%;background:${cc.rangeBg};border-radius:4px;border:1.5px solid ${cc.rangeBorder}"></div>
    <div class="progress-fill" style="width:${fillPct}%;background:${fc};opacity:${fo};border-radius:4px"></div>
    <div class="progress-marker" style="left:${avgPct}%;background:${cc.rangeBorder};border-color:${cc.rangeBorder}"></div>
    <div style="position:absolute;top:-3px;left:${fillPct}%;width:14px;height:14px;border-radius:50%;transform:translateX(-50%);background:${cc.surface};border:2.5px solid ${cc.surface};box-shadow:0 0 0 1.5px ${fc};box-sizing:border-box"></div>
  </div>`;
}

// ---- SIDEBAR ----
function renderSidebar() {

          ${k} — ${p.name}
        </button>`;
      }).join('')}
      </div>
    </div>
    <div class="cfg-divider"></div>
    <div class="cfg-section">
      <div class="cfg-label">Moment</div>
      <div class="cfg-group">${Object.keys(moments).map(k => `
        <button class="cfg-btn ${cfg.moment===k?'active':''}" onclick="cfg.moment='${k}';render()">
          ${moments[k].label} (${moments[k].time})
        </button>`).join('')}
      </div>
    </div>
    <div class="cfg-divider"></div>
    <div class="cfg-section">
      <div class="cfg-label">🍼 Lait vs norme</div>
      <div class="cfg-row">
        <button class="cfg-btn ${cfg.milkStatus==='below'?'active':''}" onclick="cfg.milkStatus='below';render()">Dessous</button>
        <button class="cfg-btn ${cfg.milkStatus==='in'?'active':''}" onclick="cfg.milkStatus='in';render()">Dans</button>
        <button class="cfg-btn ${cfg.milkStatus==='above'?'active':''}" onclick="cfg.milkStatus='above';render()">Dessus</button>
      </div>
    </div>
    <div class="cfg-section">
      <div class="cfg-label">😴 Sommeil vs norme</div>
      <div class="cfg-row">
        <button class="cfg-btn ${cfg.sleepStatus==='below'?'active':''}" onclick="cfg.sleepStatus='below';render()">Dessous</button>
        <button class="cfg-btn ${cfg.sleepStatus==='in'?'active':''}" onclick="cfg.sleepStatus='in';render()">Dans</button>
        <button class="cfg-btn ${cfg.sleepStatus==='above'?'active':''}" onclick="cfg.sleepStatus='above';render()">Dessus</button>
      </div>
    </div>
    <div class="cfg-divider"></div>
    <div class="cfg-section" style="padding:10px 12px;background:#f2f7f0;border-radius:10px">
      <div style="font-size:10px;font-weight:800;color:#3a6a3a;margin-bottom:4px">NOUVEAU : Interactions KPI</div>
      <div style="font-size:10px;font-weight:600;color:#5a7a5a;line-height:1.4">
        <b>Tap card</b> = ajout unique, heure précise<br>
        <b>++ bouton</b> = mode chaîne (multi-ajout)<br>
        Voir le détail sous le phone frame
      </div>
    </div>`;
}

// ---- DASHBOARDS ----
function renderDashboard() {
  const cc = t(); const m = mom();
  if (isNightMode()) return renderNightDash(cc, m);

  const mk = milkData(), sl = sleepData();
  const isSleeping = m.hero === 'sleep';
  return `
    <div class="status-bar" style="color:${cc.textSoft}"><span>${m.time}</span><span>📶 🔋</span></div>
    <div class="phone-inner">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0 8px">
        <div style="font-size:11px;font-weight:600;color:${cc.textSoft}">Vendredi 7 mars</div>
        <div style="font-size:11px;font-weight:600;color:${cc.textSoft}">${m.greeting} Anthony</div>
      </div>

      <button class="hero-btn" style="background:${isSleeping?cc.active.bg:cc.secondary.bg};border-radius:24px;padding:24px 24px 20px;margin-bottom:14px">
        <div style="font-size:36px;margin-bottom:6px">${m.emoji}</div>
        <div style="font-size:15px;font-weight:700;color:${isSleeping?cc.active.text:cc.text};margin-bottom:2px">${m.text}</div>
        <div style="font-size:44px;font-weight:800;color:${isSleeping?cc.active.text:cc.text};line-height:1;letter-spacing:-1px">${m.timer}</div>
        <div style="font-size:11px;font-weight:600;color:${isSleeping?cc.active.text:cc.textSoft};opacity:0.5;margin-top:4px">${m.sub}</div>
        ${isSleeping?`<div class="pulse-dot" style="background:${cc.active.dot};position:absolute;top:18px;right:18px;width:10px;height:10px"></div>`:''}
      </button>

      <div style="background:${cc.milk.bg};border-radius:20px;padding:14px 14px 14px 18px;margin-bottom:10px;cursor:pointer;transition:transform 0.1s" title="Tap card = ajouter un biberon (heure précise)">
        <div style="display:flex;align-items:center;gap:10px">

        </div>
        <button style="background:none;border:none;color:${cc.textSoft};font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;text-decoration:underline;flex-shrink:0">Annuler</button>
      </div>
      <div style="font-size:10px;font-weight:600;color:${cc.textSoft};text-align:center;margin-top:10px;opacity:0.5">
        1 tap = action immédiate · Annuler si erreur · Disparaît après ~5s
      </div>`;
  } else {
    const isEvening = cfg.moment === 'evening';
    const action = isEvening ? 'Coucher du soir' : 'Sieste';
    const emoji = isEvening ? '🌙' : '😴';
    bsH.innerHTML = `
      <div class="bs-handle" style="background:${cc.handle}"></div>
      <div style="font-size:14px;font-weight:800;color:${cc.text};margin-bottom:4px">Hero tap quand Sam est éveillé</div>
      <div style="font-size:10px;font-weight:600;color:${cc.textSoft};margin-bottom:12px">Défaut contextuel : ${action.toLowerCase()}${isEvening ? ' (à 15 min de sa moyenne)' : ''}</div>
      <div style="background:${cc.sleep.bg};border-radius:16px;padding:16px;display:flex;align-items:center;gap:12px;border:1.5px solid ${cc.sleep.accent}">
        <div style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:${cc.inRange.accent};color:#fff;font-size:16px;font-weight:800;flex-shrink:0">✓</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:800;color:${cc.text}">${emoji} ${action} démarré${isEvening?'':'e'}</div>
          <div style="font-size:11px;font-weight:600;color:${cc.textSoft}">${m.time} — chrono en cours</div>
        </div>
        <button style="background:none;border:none;color:${cc.textSoft};font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;text-decoration:underline;flex-shrink:0">Annuler</button>
      </div>
      ${isEvening ? '' : `
      <div style="margin-top:10px;text-align:center">
        <button class="hero-opt-mini" style="background:${cc.secondary.bg};color:${cc.textSoft}">Plutôt : 🌙 Coucher du soir</button>
      </div>`}
      ${!isEvening ? '' : `
      <div style="margin-top:10px;text-align:center">
        <button class="hero-opt-mini" style="background:${cc.secondary.bg};color:${cc.textSoft}">Plutôt : 😴 Sieste</button>
      </div>`}
      <div style="font-size:10px;font-weight:600;color:${cc.textSoft};text-align:center;margin-top:10px;opacity:0.5">
        1 tap = action immédiate (défaut) · "Plutôt" = corriger le type · Annuler si erreur
      </div>`;
  }
}

function render() {
  const cc = t(); const n = isNight();
  document.body.style.background = n ? '#0e140e' : '#edf2ea';
  document.getElementById('main-area').style.background = cc.bg;
  document.querySelectorAll('h2').forEach(el => el.style.color = cc.text);

  const phone = document.getElementById('phone');
  phone.style.background = cc.surface;
  phone.style.boxShadow = n ? '0 8px 32px rgba(0,0,0,0.4)' : '0 8px 32px rgba(0,0,0,0.1)';
  phone.innerHTML = renderDashboard();

  renderSidebar();
  renderQuickAdd();
  renderHeroBS();
}

render();
</script>

</body>
</html>
